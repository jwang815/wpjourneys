name: Hotel availability monitor

# Watches Hyatt.com for Lindner Hotel Antwerp on the configured dates.
# Runs every 4 hours. Once availability is found, emails jwang815@gmail.com
# and commits monitor/.found.flag back to main; subsequent scheduled runs
# short-circuit on that flag (kill switch).
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   SMTP_USERNAME — Gmail address that sends the alert
#   SMTP_PASSWORD — Google App Password for that account
#                   https://myaccount.google.com/apppasswords
#
# Re-arm: run the workflow manually with reset_flag=true to delete the flag.
#
# All third-party actions are pinned to commit SHAs (defense vs. tag-hijack
# supply-chain attacks like CVE-2025-30066 / tj-actions). Bump via Dependabot.

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:
    inputs:
      reset_flag:
        description: "Delete the kill-switch flag before running (re-arm monitor)"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: hotel-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          # Need full history so rebase-on-push works cleanly.
          fetch-depth: 0

      - name: Re-arm monitor (delete flag)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.reset_flag }}
        run: |
          set -euo pipefail
          if [ -f monitor/.found.flag ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git rm -f monitor/.found.flag
            if git diff --cached --quiet; then
              echo "Nothing to commit (already clean)."
            else
              git commit -m "monitor: re-arm (delete found flag)"
              # Retry rebase-then-push in case of concurrent commits to main.
              for attempt in 1 2 3; do
                git pull --rebase origin main && git push origin HEAD:main && break
                echo "push attempt $attempt failed; retrying"
                sleep $((attempt * 3))
              done
            fi
          else
            echo "No flag present; nothing to re-arm."
          fi

      - name: Kill switch — exit early if availability already found
        id: killswitch
        run: |
          if [ -f monitor/.found.flag ]; then
            echo "Flag present; skipping run."
            cat monitor/.found.flag
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.killswitch.outputs.skip != 'true'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: monitor/requirements.txt

      - name: Cache Playwright browsers
        if: steps.killswitch.outputs.skip != 'true'
        id: pw-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('monitor/requirements.txt') }}

      - name: Install dependencies
        if: steps.killswitch.outputs.skip != 'true'
        run: |
          set -euo pipefail
          pip install -r monitor/requirements.txt
          # Always install OS deps; skip the ~150MB browser download if cached.
          if [ "${{ steps.pw-cache.outputs.cache-hit }}" = "true" ]; then
            python -m playwright install-deps chromium
          else
            python -m playwright install --with-deps chromium
          fi

      - name: Run availability check
        if: steps.killswitch.outputs.skip != 'true'
        id: check
        env:
          HYATT_HOTEL_CODE: anrja
          CHECKIN_DATE: "2026-07-16"
          CHECKOUT_DATE: "2026-07-20"
          ROOMS: "1"
          ADULTS: "2"
          ARTIFACT_DIR: monitor/artifacts
        run: |
          set +e
          python monitor/check_availability.py
          rc=$?
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          # 0 = no availability, 2 = available, 3 = ambiguous (artifacts uploaded).
          # Only fail the job on rc=1 (hard error).
          if [ "$rc" -eq 1 ]; then exit 1; fi
          exit 0

      - name: Upload artifacts
        if: ${{ always() && steps.killswitch.outputs.skip != 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: monitor-artifacts-${{ github.run_id }}
          path: monitor/artifacts
          if-no-files-found: ignore
          retention-days: 7

      # ---- Notification path -------------------------------------------------
      # Order: send email FIRST. Only trip the kill switch if email succeeds.
      # If SMTP fails, the next scheduled run will retry both — preventing the
      # silent-stuck state where the flag is committed but no email landed.
      # `reason`/`url` are passed through env vars (sanitized in Python) instead
      # of `${{ }}` interpolation to defeat script-injection from page content.
      - name: Send email alert
        id: email
        if: ${{ steps.killswitch.outputs.skip != 'true' && steps.check.outputs.rc == '2' }}
        uses: dawidd6/action-send-mail@42942bc2f8fba4e611b459a018967a6a7c78c68c # v17
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          from: "Hyatt Monitor <${{ secrets.SMTP_USERNAME }}>"
          to: jwang815@gmail.com
          subject: "Lindner Hotel Antwerp available — ${{ steps.check.outputs.checkin }} → ${{ steps.check.outputs.checkout }}"
          body: |
            Availability detected for Lindner Hotel Antwerp on Hyatt.com.

            Dates:      ${{ steps.check.outputs.checkin }} → ${{ steps.check.outputs.checkout }}
            Guests:     ${{ steps.check.outputs.adults }} adults, ${{ steps.check.outputs.rooms }} room
            Confidence: ${{ steps.check.outputs.confidence }}
            Reason:     ${{ steps.check.outputs.reason }}

            Book here: ${{ steps.check.outputs.url }}

            The kill switch has been tripped — no further scheduled runs will
            execute until you re-arm via Actions → Hotel availability monitor →
            Run workflow with "reset_flag" enabled.

            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Trip kill switch (commit found flag)
        if: ${{ success() && steps.killswitch.outputs.skip != 'true' && steps.check.outputs.rc == '2' && steps.email.outcome == 'success' }}
        env:
          FLAG_RUN_ID: ${{ github.run_id }}
          FLAG_CHECKIN: ${{ steps.check.outputs.checkin }}
          FLAG_CHECKOUT: ${{ steps.check.outputs.checkout }}
          FLAG_CONFIDENCE: ${{ steps.check.outputs.confidence }}
          FLAG_URL: ${{ steps.check.outputs.url }}
        run: |
          set -euo pipefail
          mkdir -p monitor
          {
            echo "found_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "run_id=${FLAG_RUN_ID}"
            echo "checkin=${FLAG_CHECKIN}"
            echo "checkout=${FLAG_CHECKOUT}"
            echo "confidence=${FLAG_CONFIDENCE}"
            echo "url=${FLAG_URL}"
            echo "hotel=Lindner Hotel Antwerp"
          } > monitor/.found.flag
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add monitor/.found.flag
          git commit -m "monitor: availability detected — tripping kill switch"
          # Retry rebase-then-push to survive any concurrent commit to main.
          for attempt in 1 2 3; do
            git pull --rebase origin main && git push origin HEAD:main && break
            echo "push attempt $attempt failed; retrying"
            sleep $((attempt * 3))
          done

      # Belt-and-suspenders: if rc=2 but the email step failed, fail the job
      # loudly so GitHub's own "workflow failed" notification reaches the user
      # via their account-level notification settings (independent of SMTP).
      - name: Fail loudly if availability found but email did not send
        if: ${{ steps.killswitch.outputs.skip != 'true' && steps.check.outputs.rc == '2' && steps.email.outcome != 'success' }}
        run: |
          echo "::error ::Availability detected but email step did not succeed (outcome=${{ steps.email.outcome }}). Kill switch NOT tripped; next scheduled run will retry."
          exit 1
